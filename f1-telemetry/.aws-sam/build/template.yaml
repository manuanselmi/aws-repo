AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: F1 Telemetry - SAM Application
Globals:
  Function:
    Runtime: python3.12
    Timeout: 30
    MemorySize: 256
Resources:
  ListDriversFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: handler.handler
      CodeUri: ListDriversFunction
      Policies:
      - AWSLambdaBasicExecutionRole
    Metadata:
      SamResourceId: ListDriversFunction
