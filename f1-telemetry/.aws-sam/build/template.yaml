AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: F1 Telemetry - SAM Application
Globals:
  Function:
    Runtime: python3.12
    Timeout: 30
    MemorySize: 256
Resources:
  ListDriversFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: handler.handler
      CodeUri: ListDriversFunction
      Policies:
      - AWSLambdaBasicExecutionRole
      Events:
        Api:
          Type: Api
          Properties:
            Path: /drivers
            Method: GET
    Metadata:
      SamResourceId: ListDriversFunction
  GetSessionFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: handler.handler
      CodeUri: GetSessionFunction
      Policies:
      - AWSLambdaBasicExecutionRole
      Events:
        Api:
          Type: Api
          Properties:
            Path: /sessions/{session_key}
            Method: GET
    Metadata:
      SamResourceId: GetSessionFunction
  ListSessionsFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: handler.handler
      CodeUri: ListSessionsFunction
      Policies:
      - AWSLambdaBasicExecutionRole
      Events:
        Api:
          Type: Api
          Properties:
            Path: /sessions
            Method: GET
    Metadata:
      SamResourceId: ListSessionsFunction
  DriverSummaryFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: handler.handler
      CodeUri: DriverSummaryFunction
      Policies:
      - AWSLambdaBasicExecutionRole
      Events:
        Api:
          Type: Api
          Properties:
            Path: /drivers/summary
            Method: GET
    Metadata:
      SamResourceId: DriverSummaryFunction
Outputs:
  ApiUrl:
    Description: URL base del API Gateway
    Value:
      Fn::Sub: https://${ServerlessRestApi}.execute-api.${AWS::Region}.amazonaws.com/Prod
