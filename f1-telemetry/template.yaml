AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: F1 Telemetry - SAM Application

Parameters:
  TableName:
    Type: String
    Default: F1Telemetry
  DynamoEndpoint:
    Type: String
    Default: http://host.docker.internal:4566

Globals:
  Function:
    Runtime: python3.12
    Timeout: 60
    MemorySize: 256
    Environment:
      Variables:
        TABLE_NAME: !Ref TableName
        DYNAMODB_ENDPOINT: !Ref DynamoEndpoint
        AWS_ACCESS_KEY_ID: local
        AWS_SECRET_ACCESS_KEY: local

Resources:
  IngestSessionFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: IngestSession
      Handler: handler.handler
      CodeUri: functions/ingest-session/
      Events:
        Api:
          Type: Api
          Properties:
            Path: /sessions/{session_key}/ingest
            Method: POST

  ListSessionsFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: ListSessions
      Handler: handler.handler
      CodeUri: functions/list-sessions/
      Events:
        Api:
          Type: Api
          Properties:
            Path: /sessions
            Method: GET

  ListDriversFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: ListDrivers
      Handler: handler.handler
      CodeUri: functions/list-drivers/
      Events:
        Api:
          Type: Api
          Properties:
            Path: /sessions/{session_key}/drivers
            Method: GET

  DriverSummaryFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: DriverSummary
      Handler: handler.handler
      CodeUri: functions/driver-summary/
      Events:
        Api:
          Type: Api
          Properties:
            Path: /sessions/{session_key}/drivers/{driver_id}/summary
            Method: GET

  DriverLapsFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: DriverLaps
      Handler: handler.handler
      CodeUri: functions/driver-laps/
      Events:
        Api:
          Type: Api
          Properties:
            Path: /sessions/{session_key}/drivers/{driver_id}/laps
            Method: GET

Outputs:
  ApiUrl:
    Value: http://localhost:3000
