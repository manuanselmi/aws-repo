AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  actividad3 — Week 3: SAM Deep Dive. Production-ready OpenF1 API with
  multi-environment deployment (dev/prod).

Parameters:
  Environment:
    Type: String
    Default: dev
    AllowedValues:
      - dev
      - prod
    Description: Deployment environment (dev or prod)

Conditions:
  IsProd: !Equals [!Ref Environment, prod]

Globals:
  Function:
    Runtime: python3.12
    Timeout: 30
    MemorySize: 256
    Architectures:
      - x86_64
    Environment:
      Variables:
        ENV: !Ref Environment
    LoggingConfig:
      LogFormat: JSON

Resources:
  ListSessionsFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "openf1-list-sessions-${Environment}"
      CodeUri: f1_api/
      Handler: handler.list_sessions
      Events:
        ListSessions:
          Type: Api
          Properties:
            Path: /sessions
            Method: get

  GetSessionFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "openf1-get-session-${Environment}"
      CodeUri: f1_api/
      Handler: handler.get_session
      Events:
        GetSession:
          Type: Api
          Properties:
            Path: /sessions/{session_key}
            Method: get

  IngestSessionFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "openf1-ingest-session-${Environment}"
      CodeUri: f1_api/
      Handler: handler.ingest_session
      Timeout: 120
      MemorySize: !If [IsProd, 1024, 512]
      ReservedConcurrentExecutions: !If [IsProd, 10, 2]
      Events:
        IngestSession:
          Type: Api
          Properties:
            Path: /sessions/{session_key}/ingest
            Method: post

Outputs:
  EnvironmentName:
    Description: "Current deployment environment"
    Value: !Ref Environment

  ApiUrl:
    Description: "API Gateway endpoint URL"
    Value: !Sub "https://${ServerlessRestApi}.execute-api.${AWS::Region}.amazonaws.com/Prod/"

  ListSessionsFunctionArn:
    Description: "ListSessions Lambda ARN"
    Value: !GetAtt ListSessionsFunction.Arn

  GetSessionsFunctionArn:
    Description: "GetSession Lambda ARN"
    Value: !GetAtt GetSessionFunction.Arn

  IngestSessionFunctionArn:
    Description: "IngestSession Lambda ARN"
    Value: !GetAtt IngestSessionFunction.Arn
