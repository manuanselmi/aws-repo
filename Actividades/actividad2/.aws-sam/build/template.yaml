AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: "actividad2 \u2014 Week 2: API Gateway and Event Sources (OpenF1 REST\
  \ API)\n"
Globals:
  Function:
    Timeout: 30
    Runtime: python3.12
    MemorySize: 256
    Architectures:
    - x86_64
    LoggingConfig:
      LogFormat: JSON
Resources:
  ListSessionsFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ListSessionsFunction
      Handler: handler.list_sessions
      Events:
        ListSessions:
          Type: Api
          Properties:
            Path: /sessions
            Method: get
    Metadata:
      SamResourceId: ListSessionsFunction
  GetSessionFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: GetSessionFunction
      Handler: handler.get_session
      Events:
        GetSession:
          Type: Api
          Properties:
            Path: /sessions/{session_key}
            Method: get
    Metadata:
      SamResourceId: GetSessionFunction
  IngestSessionFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: IngestSessionFunction
      Handler: handler.ingest_session
      Timeout: 120
      MemorySize: 512
      Events:
        IngestSession:
          Type: Api
          Properties:
            Path: /sessions/{session_key}/ingest
            Method: post
    Metadata:
      SamResourceId: IngestSessionFunction
Outputs:
  ApiUrl:
    Description: API Gateway endpoint URL
    Value:
      Fn::Sub: https://${ServerlessRestApi}.execute-api.${AWS::Region}.amazonaws.com/Prod/
  ListSessionsFunctionArn:
    Description: ListSessions Lambda ARN
    Value:
      Fn::GetAtt:
      - ListSessionsFunction
      - Arn
  GetSessionFunctionArn:
    Description: GetSession Lambda ARN
    Value:
      Fn::GetAtt:
      - GetSessionFunction
      - Arn
  IngestSessionFunctionArn:
    Description: IngestSession Lambda ARN
    Value:
      Fn::GetAtt:
      - IngestSessionFunction
      - Arn
